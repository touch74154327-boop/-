<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제미의 영어 퀴즈</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f7f7f7; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; }
        button { background-color: #58cc02; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="question">사과는 영어로?</h2>
        <input type="text" id="answer" placeholder="정답을 적으세요">
        <br>
        <button onclick="checkAnswer()">확인하기</button>
        <p id="result"></p>
    </div>

    <script>
        const quizData = [
            { q: "사과는 영어로?", a: "apple" },
            { q: "책은 영어로?", a: "book" },
            { q: "학교는 영어로?", a: "school" }
        ];
        let currentIdx = 0;

        function checkAnswer() {
            const userAns = document.getElementById('answer').value.toLowerCase().trim();
            const resultDiv = document.getElementById('result');

            if (userAns === quizData[currentIdx].a) {
                resultDiv.innerText = "정답입니다! 🎉";
                resultDiv.style.color = "green";
                currentIdx = (currentIdx + 1) % quizData.length; // 다음 문제로
                setTimeout(() => {
                    document.getElementById('question').innerText = quizData[currentIdx].q;
                    document.getElementById('answer').value = "";
                    resultDiv.innerText = "";
                }, 1500);
            } else {
                resultDiv.innerText = "다시 해보세요! 🤔";
                resultDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
